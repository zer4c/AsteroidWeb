<!DOCTYPE html>
<html>

<head>
    <title>Juego Asteroides</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/vidas.css">
    <link rel="stylesheet" href="styles/inicioJuego.css">
    <link rel="stylesheet" href="styles/reiniciarJuego.css">
    <link rel="stylesheet" href="styles/gameOver.css">
    <link rel="stylesheet" href="styles/leaderboard.css">
    <link rel="stylesheet" href="styles/landscape.css">
</head>

<body>
    <audio id="bg-music" autoplay muted loop>
        <source src="audio/My Demons - Starset -.mp3" type="audio/mp3">
    </audio>
    <div class="leaderboard">
        <div class="lb-title">Top 10</div>
        <div id="leaderboard-list"></div>
    </div>

    <div class="overlay-leaderboard oculto" id="overlay-leaderboard">
        <div class="leaderboard">
            <div class="lb-title">Top 10</div>
            <div id="leaderboard-list-landscape"></div>
            <button class="lb-cerrar" id="btn-cerrar-lb">cerrar</button>
        </div>
    </div>

    <div class="landscape-hud">
        <span class="hud-score-label">Puntaje</span>
        <span class="hud-score-value" id="hud-score">0</span>
        <div class="hud-hearts">
            <span class="hud-heart" id="hud-heart-1">&#9829;</span>
            <span class="hud-heart" id="hud-heart-2">&#9829;</span>
            <span class="hud-heart" id="hud-heart-3">&#9829;</span>
        </div>
        <div class="hud-balas">
            <div class="hud-bala active" id="hud-bala-1"></div>
            <div class="hud-bala active" id="hud-bala-2"></div>
            <div class="hud-bala active" id="hud-bala-3"></div>
            <div class="hud-bala active" id="hud-bala-4"></div>
            <div class="hud-bala active" id="hud-bala-5"></div>
        </div>
    </div>

    <div class="mobile-controls">
        <div class="mc-left">
            <button class="mc-btn" id="m-izq">&lt;</button>
            <button class="mc-btn" id="m-der">&gt;</button>
        </div>
        <div class="mc-right">
            <button class="mc-btn" id="m-up">^</button>
            <button class="mc-btn" id="m-down">v</button>
            <button class="mc-btn-fire" id="m-fire">*</button>
        </div>
        <div class="mc-top-right">
            <button class="mc-btn-lb" id="m-lb">TOP</button>
        </div>
    </div>

    <div class="game-ui">
        <div class="ui-top">
            <div class="game-title">ASTEROIDES</div>
        </div>
        <div class="ui-bottom">
            <div class="game-score">PUNTAJE: <span id="score-value">0</span></div>
            <div class="game-lives">
                <span class="ui-label">VIDAS:</span>
                <div class="lives-hearts">
                    <div class="heart" id="heart-1">&#9829;</div>
                    <div class="heart" id="heart-2">&#9829;</div>
                    <div class="heart" id="heart-3">&#9829;</div>
                </div>
            </div>
            <div class="game-balas">
                <span class="ui-label">BALAS:</span>
                <div class="balas-bars">
                    <div class="balas-bar" id="balas-1"></div>
                    <div class="balas-bar" id="balas-2"></div>
                    <div class="balas-bar" id="balas-3"></div>
                    <div class="balas-bar" id="balas-4"></div>
                    <div class="balas-bar" id="balas-5"></div>
                </div>
            </div>
            <button class="btn-ui" id="btn-reiniciar">REINICIAR</button>
        </div>
    </div>

    <div class="game-container">
        <canvas id="miCanvas"></canvas>
        <div class="overlay" id="game-inicio">
            <button class="btn-overlay" id="btn-iniciar">INICIAR</button>
        </div>
        <div class="overlay oculto" id="overlay-gameover">
            <div class="gameover-content">
                <h2>GAME OVER</h2>
                <button class="btn-overlay" id="btn-reiniciar-gameover">REINICIAR</button>
            </div>
        </div>
    </div>

    <script src="modules/colisiones/particula.model.js"></script>
    <script src="modules/colisiones/particulaRectangular.svg.js"></script>
    <script src="modules/colisiones/particulaRedonda.svg.js"></script>
    <script src="modules/colisiones/particulas.controller.js"></script>
    <script src="modules/balas/bala.model.js"></script>
    <script src="modules/balas/balas.svg.js"></script>
    <script src="modules/balas/balas.controller.js"></script>
    <script src="modules/asteroid/asteroide.model.js"></script>
    <script src="modules/asteroid/asteroide1.svg.js"></script>
    <script src="modules/asteroid/asteroide2.svg.js"></script>
    <script src="modules/asteroid/estrella.svg.js"></script>
    <script src="modules/asteroid/asteroide.class.js"></script>
    <script src="modules/nave/nave.model.js"></script>
    <script src="modules/nave/nave.svg.js"></script>
    <script src="modules/nave/nave.controller.js"></script>
    <script src="modules/score/score.model.js"></script>
    <script src="modules/score/score.view.js"></script>
    <script src="modules/score/leaderboard.model.js"></script>
    <script src="modules/score/leaderboard.view.js"></script>
    <script src="modules/pantallaJuego/pantallaJuego.model.js"></script>
    <script src="modules/pantallaJuego/pantallaJuego.view.js"></script>
    <script src="modules/colisiones/colisiones.controller.js"></script>
    <script src="modules/pantallaJuego/controlesMovil.controller.js"></script>
    <script src="modules/pantallaJuego/leaderboardUI.controller.js"></script>
    <script src="modules/pantallaJuego/pantallaJuego.js"></script>
    <script src="modules/main.js"></script>
</body>

</html>
