<!DOCTYPE html>
<html>
<head>
    <title>Juego Asteroides</title>
    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/vidas.css">
    <link rel="stylesheet" href="styles/inicioJuego.css">
    <link rel="stylesheet" href="styles/reiniciarJuego.css">
</head>
<body>
    <div class="game-ui">
        <div class="game-title">ASTEROIDES</div>
        <div class="game-score">PUNTAJE: <span id="score-value">0</span></div>
        <div class="game-lives">
            <span class="lives-label">VIDAS:</span>
            <div class="lives-hearts">
                <div class="heart" id="heart-1">♥</div>
                <div class="heart" id="heart-2">♥</div>
                <div class="heart" id="heart-3">♥</div>
            </div>
        </div>
        <div class="game-ammo">
            <span class="ammo-label">BALAS:</span>
            <div class="ammo-bars">
                <div class="ammo-bar" id="ammo-1"></div>
                <div class="ammo-bar" id="ammo-2"></div>
                <div class="ammo-bar" id="ammo-3"></div>
                <div class="ammo-bar" id="ammo-4"></div>
                <div class="ammo-bar" id="ammo-5"></div>
            </div>
        </div>
        <button class="btn-reiniciar" id="btn-reiniciar">REINICIAR</button>
    </div>

    <div class="game-container">
        <canvas id="miCanvas" width="800" height="600"></canvas>
        <div class="game-inicio-juego" id="game-inicio">
            <button class="btn-juego" id="btn-iniciar">INICIAR</button>
        </div>
    </div>
    <script src="modules/asteroid/asteroide1.svg.js"></script>
    <script src="modules/asteroid/asteroide2.svg.js"></script>
    <script src="modules/asteroid/asteroide.class.js"></script>
    <script src="modules/colisiones/particulaRectangular.svg.js"></script>
    <script src="modules/colisiones/particulaRedonda.svg.js"></script>
    <script src="modules/colisiones/particulas.controller.js"></script>
    <script src="modules/balas/balas.svg.js"></script>
    <script src="modules/balas/balas.controller.js"></script>
    <script src="modules/score/score.js"></script>
    <script src="modules/pantallaJuego/pantallaJuego.js"></script>
    <script src="modules/nave/nave.js"></script>
    <script src="modules/nave/nave.controller.js"></script>
    <script src="modules/main.js"></script>
</body>
</html>
